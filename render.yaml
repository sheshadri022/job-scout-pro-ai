services:
  # ── API Server (Express + Drizzle + Supabase Auth) ──────────────────────────
  # Service ID: srv-d8plf6rsq97s7387fkn0
  # URL: https://job-scout-api-723v.onrender.com
  - type: web
    name: job-scout-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps artifacts/api-server/dist/index.mjs"
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        value: https://qvznbxqyjtivgcldckoo.supabase.co
      - key: DATABASE_URL
        sync: false          # Supabase PostgreSQL connection string
      - key: SUPABASE_DATABASE_URL
        sync: false          # Same as DATABASE_URL — Supabase PostgreSQL
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # ── Frontend (Vite static site) ──────────────────────────────────────────────
  # Service ID: srv-d8plfli8qa3s73bvk5h0
  # URL: https://job-scout-frontend-42i7.onrender.com
  - type: web
    name: job-scout-frontend
    runtime: static
    plan: free
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/job-assistant run build"
    staticPublishPath: artifacts/job-assistant/dist
    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://qvznbxqyjtivgcldckoo.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        value: https://job-scout-api-723v.onrender.com
